<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Watchout Security - Pregled potrosnje goriva</title>
  <desc id="desc">Fuel Manager application icon with fuel pump, green accent and Watchout shield.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263238"/>
      <stop offset="0.55" stop-color="#11191f"/>
      <stop offset="1" stop-color="#071015"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="0.55" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#145318"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D6DCE0"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4B555B"/>
      <stop offset="1" stop-color="#11181D"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="hex" width="42" height="36" patternUnits="userSpaceOnUse" patternTransform="translate(0 0)">
      <path d="M10.5 1 L31.5 1 L42 18 L31.5 35 L10.5 35 L0 18 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="26" y="26" width="460" height="460" rx="82" fill="url(#bg)"/>
  <rect x="26" y="26" width="460" height="460" rx="82" fill="url(#hex)" opacity="0.75"/>
  <rect x="35" y="35" width="442" height="442" rx="73" fill="none" stroke="#0A0F12" stroke-width="7"/>
  <rect x="42" y="42" width="428" height="428" rx="67" fill="none" stroke="url(#accent)" stroke-width="10"/>
  <rect x="54" y="54" width="404" height="404" rx="57" fill="none" stroke="#FFFFFF" stroke-opacity="0.11" stroke-width="2"/>

  <g filter="url(#shadow)">
    <!-- Fuel pump body -->
    <rect x="145" y="112" width="140" height="246" rx="18" fill="url(#white)"/>
    <rect x="162" y="132" width="106" height="70" rx="7" fill="#162028"/>
    <path d="M176 147 H252 V187 H176 Z" fill="#FFFFFF" opacity="0.95"/>
    <path d="M188 160 H239 V176 H188 Z" fill="#121A20" opacity="0.88"/>
    <rect x="131" y="348" width="171" height="24" rx="8" fill="url(#white)"/>

    <!-- Fuel drop -->
    <path d="M215 224 C198 247 180 274 180 300 C180 326 196 344 215 344 C234 344 250 326 250 300 C250 274 232 247 215 224 Z" fill="url(#accent)"/>
    <path d="M198 307 C200 324 211 333 224 331" fill="none" stroke="#0D4116" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <path d="M208 241 C194 263 187 283 188 300" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="5" stroke-linecap="round"/>

    <!-- Hose and nozzle -->
    <path d="M288 160 C326 171 341 195 341 232 V319 C341 346 377 346 377 319 V214" fill="none" stroke="url(#white)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M363 120 L404 161" fill="none" stroke="url(#white)" stroke-width="18" stroke-linecap="round"/>
    <path d="M396 155 L380 171 L418 205 L433 190 Z" fill="url(#white)"/>
    <path d="M420 192 V240" fill="none" stroke="url(#white)" stroke-width="15" stroke-linecap="round"/>
  </g>

  <!-- Watchout shield -->
  <g transform="translate(204 356)" filter="url(#soft)">
    <path d="M52 0 L103 20 V67 C103 102 76 124 52 136 C28 124 1 102 1 67 V20 Z" fill="url(#shield)" stroke="#FFFFFF" stroke-width="7" stroke-linejoin="round"/>
    <path d="M52 12 L91 27 V65 C91 91 70 109 52 119 C34 109 13 91 13 65 V27 Z" fill="none" stroke="#9EA8AE" stroke-opacity="0.75" stroke-width="3"/>
    <text x="52" y="82" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="56" text-anchor="middle" fill="#FFFFFF">W</text>
  </g>
</svg>
